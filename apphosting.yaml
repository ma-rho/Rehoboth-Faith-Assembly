# Specifies the version of the App Hosting schema.
specVersion: v1alpha1

# Defines the commands and environment for running your application.
run:
  command: npm run start
  # Environment variables available at runtime.
  environment:
    # Stripe secrets. The value will be sourced from Secret Manager.
    STRIPE_SECRET_KEY:
      secret: STRIPE_SECRET_KEY
    NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:
      secret: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
      
    # Firebase client-side configuration secrets.
    # These must be created in Secret Manager for the deployment to succeed.
    NEXT_PUBLIC_FIREBASE_API_KEY:
      secret: NEXT_PUBLIC_FIREBASE_API_KEY
    NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:
      secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    NEXT_PUBLIC_FIREBASE_PROJECT_ID:
      secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:
      secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:
      secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    NEXT_PUBLIC_FIREBASE_APP_ID:
      secret: NEXT_PUBLIC_FIREBASE_APP_ID

# Defines the settings for building your application.
build:
  # Environment variables available only during the build process.
  environment:
    # Stripe secrets required for the build.
    STRIPE_SECRET_KEY:
      secret: STRIPE_SECRET_KEY
    NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:
      secret: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY

    # Firebase client-side configuration secrets required for the build.
    NEXT_PUBLIC_FIREBASE_API_KEY:
      secret: NEXT_PUBLIC_FIREBASE_API_KEY
    NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:
      secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    NEXT_PUBLIC_FIREBASE_PROJECT_ID:
      secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:
      secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:
      secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    NEXT_PUBLIC_FIREBASE_APP_ID:
      secret: NEXT_PUBLIC_FIREBASE_APP_ID
